<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b45309;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.08"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1920" height="480" fill="url(#bg)"/>
  <rect width="1920" height="480" fill="url(#accent)"/>
  <rect width="1920" height="480" fill="url(#grid)"/>
  <circle cx="1600" cy="120" r="120" fill="#f59e0b" opacity="0.06"/>
  <circle cx="200" cy="380" r="80" fill="#b45309" opacity="0.08"/>
  <rect x="400" y="200" width="300" height="2" fill="#f59e0b" opacity="0.2" transform="rotate(-15 550 201)"/>
  <rect x="1200" y="300" width="200" height="2" fill="#f59e0b" opacity="0.15" transform="rotate(10 1300 301)"/>
</svg>
